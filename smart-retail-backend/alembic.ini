# Alembic Environment Configuration
# ============================================================
# To initialise (first time):
#   alembic init alembic
# Then point env.py to your SQLAlchemy Base and DATABASE_URL.
# ============================================================

[alembic]
# Relative path to the migration scripts directory
script_location = alembic

# Template for new revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Database URL — read from .env at runtime (see alembic/env.py)
# Do NOT hardcode credentials here
sqlalchemy.url =

# ── Logging ──────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
