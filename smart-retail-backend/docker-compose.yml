# ============================================================
#  Smart Retail Platform — Docker Compose
#  Services: api · nginx · prometheus · grafana
#  Usage:
#    docker compose up -d            # start all services
#    docker compose logs -f api      # tail API logs
#    docker compose down -v          # stop + remove volumes
# ============================================================

version: "3.9"

# ── Shared network ────────────────────────────────────────────
networks:
  smart_retail_net:
    driver: bridge

# ── Persistent volumes ────────────────────────────────────────
volumes:
  db_data:          # SQLite DB file
  model_data:       # Trained ML models
  upload_data:      # File uploads
  log_data:         # Application logs
  prometheus_data:  # Prometheus metrics
  grafana_data:     # Grafana dashboards

# ── Services ──────────────────────────────────────────────────
services:

  # ── FastAPI Application ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: smart_retail_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite:////data/supply_chain.db
    ports:
      - "8000:8000"          # Exposed directly for dev; remove in prod (nginx handles it)
    volumes:
      - db_data:/data                          # Persist SQLite DB
      - model_data:/app/ml/saved_models        # Persist trained models
      - upload_data:/app/uploads               # Persist uploads
      - log_data:/app/logs                     # Persist structured logs
    networks:
      - smart_retail_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on: []
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: smart_retail_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/smart_retail.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro            # Mount TLS certs
      - log_data:/var/log/nginx
    networks:
      - smart_retail_net
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Prometheus Metrics ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: smart_retail_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - smart_retail_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana Dashboards ──────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: smart_retail_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}   # Override in .env
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - smart_retail_net
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
